name: Validation des données
on:
  # Sur PR : on valide TOUT le dataset à chaque fois (build.py --check ~10 s) afin
  # que le check requis « validate » se rapporte toujours. Sinon une PR ne touchant
  # que site/ ou docs/ resterait bloquée par la protection de branche (check jamais émis).
  pull_request:
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Valider les nœuds (schéma + cohérence des sommes)
        run: python3 scripts/build.py --check
