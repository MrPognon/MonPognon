name: Validation des données
on:
  pull_request:
    paths: ["data/**", "schema/**", "scripts/**"]
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Valider les nœuds (schéma + cohérence des sommes)
        run: python3 scripts/build.py --check
